services:
  diagnosta-web:
    container_name: diagnosta_web
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DIAGNOSTA_WEBHOOK_SECRET=${DIAGNOSTA_WEBHOOK_SECRET}
      - DIAGNOSTA_SALT=${DIAGNOSTA_SALT}
    networks:
      - n8n-net

networks:
  n8n-net:
    external: true
